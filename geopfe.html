<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPFE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            padding-top: 80px;
            gap: 20px;
        }

        body.victory { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); transition: background 0.5s ease; }

        /* ── Nav ────────────────────────────────────────────────── */
        .nav-bar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: white; border-radius: 50px; padding: 10px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); display: flex; gap: 10px; z-index: 9999;
        }
        .nav-bar a {
            text-decoration: none; color: #2c3e50; padding: 8px 20px;
            border-radius: 25px; font-weight: 600; transition: all 0.3s;
        }
        .nav-bar a:hover { background: #f8f9fa; }
        .nav-bar a.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

        /* ── Container ──────────────────────────────────────────── */
        .container {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 760px; width: 100%;
        }

        h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; font-size: 2em; }

        /* ── Mode toggle ────────────────────────────────────────── */
        .mode-toggle { display: flex; justify-content: center; margin-bottom: 20px; }
        .mode-toggle-inner {
            display: flex; background: #f0f0f5; border-radius: 30px; padding: 4px; gap: 4px;
        }
        .mode-btn {
            padding: 8px 22px; border-radius: 25px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.25s ease; background: transparent; color: #6c757d;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; box-shadow: 0 3px 10px rgba(102,126,234,0.4);
        }
        .mode-btn:hover:not(.active) { background: #e0e0ea; color: #2c3e50; }

        /* ── Score bar ──────────────────────────────────────────── */
        .score-display {
            text-align: center; color: #667eea; font-size: 18px; font-weight: bold;
            margin-bottom: 16px; padding: 10px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); border-radius: 10px;
        }
        .score-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 4px 14px; border-radius: 20px; font-size: 17px; margin-left: 8px;
        }

        /* ── Question label ─────────────────────────────────────── */
        .question-label {
            text-align: center; font-size: 1.05em; color: #6c757d;
            margin-bottom: 12px; font-style: italic;
        }
        .question-label strong { color: #2c3e50; font-style: normal; font-size: 1.15em; }

        /* ── Hint label ─────────────────────────────────────────── */
        .hint-label {
            text-align: center; font-size: 0.9em; color: #95a5a6;
            margin-bottom: 10px; min-height: 1.2em;
            transition: color 0.3s;
        }
        .hint-label.placed { color: #667eea; font-weight: 600; }

        /* ── Map ────────────────────────────────────────────────── */
        #map {
            width: 100%; height: 420px;
            border-radius: 14px;
            border: 3px solid #e9ecef;
            margin-bottom: 16px;
            cursor: crosshair;
        }

        /* ── Result card (shown after validation) ───────────────── */
        .result-card {
            display: none;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px; padding: 16px 20px;
            margin-bottom: 16px; text-align: center;
            animation: fadeIn 0.4s ease;
        }
        .result-card.show { display: block; }
        .result-card .distance {
            font-size: 1.5em; font-weight: 700; color: #2c3e50; margin-bottom: 4px;
        }
        .result-card .round-score {
            font-size: 1.1em; color: #667eea; font-weight: 600;
        }
        .result-card .answer-name {
            font-size: 1em; color: #6c757d; margin-top: 6px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Buttons ────────────────────────────────────────────── */
        .button-row {
            display: flex; gap: 10px;
        }
        .btn-submit, .btn-next {
            flex: 1; padding: 14px; font-size: 16px; font-weight: 600;
            border: none; border-radius: 10px; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn-submit:hover, .btn-next:hover {
            transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;
        }
        .btn-submit:disabled {
            background: #ced4da; cursor: not-allowed; transform: none; box-shadow: none;
        }
        .btn-next {
            background: #2ecc71; color: white; display: none;
        }
        .btn-next.show { display: flex; align-items: center; justify-content: center; }

        /* ── Loading ────────────────────────────────────────────── */
        .loading { text-align: center; color: white; font-size: 1.5em; }

        @media (max-width: 600px) {
            .container { padding: 16px; }
            h1 { font-size: 1.5em; }
            #map { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html">PFEmoji</a>
        <a href="pfetudiants.html">PFEtudiants</a>
        <a href="geopfe.html" class="active">GeoPFE</a>
    </div>

    <div class="loading" id="loading">Chargement des énigmes...</div>

    <div class="container" style="display:none;" id="gameContainer">
        <h1>🌍 GeoPFE</h1>

        <!-- Mode toggle -->
        <div class="mode-toggle">
            <div class="mode-toggle-inner">
                <button class="mode-btn active" id="btnComplet" onclick="setMode('complet')">🗂 Complet</button>
                <button class="mode-btn"         id="btnRapide"  onclick="setMode('rapide')">⚡ Rapide (10)</button>
            </div>
        </div>

        <!-- Score -->
        <div class="score-display">
            Score : <span class="score-badge" id="scoreValue">0</span>
            <span style="margin-left: 20px; font-size: 15px; color: #6c757d;">
                Énigmes résolues : <span id="resolvedCount">0</span>/<span id="totalCount">0</span>
            </span>
        </div>

        <!-- Question -->
        <div class="question-label" id="questionLabel">Chargement...</div>
        <div class="hint-label"     id="hintLabel">Cliquez sur la carte pour poser votre pin 📍</div>

        <!-- Map -->
        <div id="map"></div>

        <!-- Result card (hidden until after validation) -->
        <div class="result-card" id="resultCard">
            <div class="distance"    id="resultDistance"></div>
            <div class="round-score" id="resultScore"></div>
            <div class="answer-name" id="resultName"></div>
        </div>

        <!-- Buttons -->
        <div class="button-row">
            <button class="btn-submit" id="btnValider" onclick="validateGuess()" disabled>Valider</button>
            <button class="btn-next"   id="btnNext"    onclick="newEnigme()">Suivant !</button>
        </div>
    </div>

    <script>
        /* ── State ────────────────────────────────────────────── */
        let enigmes       = [];
        let activePool    = [];
        let currentEnigme = null;
        let playedEnigmes = [];
        let totalScore    = 0;
        let currentMode   = 'complet';
        let guessMarker   = null;
        let answerMarker  = null;
        let guessLine     = null;
        let map           = null;

        const QUICK_COUNT = 10;

        /* ── Map init ─────────────────────────────────────────── */
        function initMap() {
            map = L.map('map', {
                center: [20, 10],
                zoom: 2,
                minZoom: 1,
                maxZoom: 10,
                worldCopyJump: true
            });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            map.on('click', onMapClick);
        }

        function onMapClick(e) {
            // Ignore clicks after validation
            if (document.getElementById('btnNext').classList.contains('show')) return;

            const { lat, lng } = e.latlng;

            if (guessMarker) {
                guessMarker.setLatLng([lat, lng]);
            } else {
                guessMarker = L.marker([lat, lng], { icon: guessIcon() }).addTo(map);
            }

            document.getElementById('btnValider').disabled = false;
            document.getElementById('hintLabel').textContent = `📍 Pin posé — cliquez encore pour déplacer, ou validez !`;
            document.getElementById('hintLabel').classList.add('placed');
        }

        /* ── Custom icons ─────────────────────────────────────── */
        function guessIcon() {
            return L.divIcon({
                className: '',
                html: `<div style="
                    width:32px;height:32px;border-radius:50% 50% 50% 0;
                    background:linear-gradient(135deg,#667eea,#764ba2);
                    border:3px solid white;
                    box-shadow:0 3px 10px rgba(0,0,0,0.3);
                    transform:rotate(-45deg);
                "></div>`,
                iconSize: [32, 32],
                iconAnchor: [16, 32]
            });
        }

        function answerIcon() {
            return L.divIcon({
                className: '',
                html: `<div style="
                    width:32px;height:32px;border-radius:50% 50% 50% 0;
                    background:linear-gradient(135deg,#2ecc71,#27ae60);
                    border:3px solid white;
                    box-shadow:0 3px 10px rgba(0,0,0,0.3);
                    transform:rotate(-45deg);
                "></div>`,
                iconSize: [32, 32],
                iconAnchor: [16, 32]
            });
        }

        /* ── Score formula (GeoGuessr-inspired) ───────────────── */
        // Max 5000 pts, decay with distance (km). ~5000 at 0km, ~0 at 5000km.
        function calculateScore(distanceKm) {
            return Math.round(5000 * Math.exp(-distanceKm / 1500));
        }

        // Haversine distance in km
        function haversineKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 +
                      Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function formatDistance(km) {
            if (km < 1)    return `${Math.round(km * 1000)} m`;
            if (km < 100)  return `${km.toFixed(1)} km`;
            return `${Math.round(km)} km`;
        }

        /* ── Score display ────────────────────────────────────── */
        function updateScoreDisplay() {
            document.getElementById('scoreValue').textContent    = totalScore;
            document.getElementById('resolvedCount').textContent = Math.max(0, playedEnigmes.length - 1);
            document.getElementById('totalCount').textContent    = activePool.length;
        }

        /* ── Helpers ──────────────────────────────────────────── */
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        /* ── Mode toggle ──────────────────────────────────────── */
        function setMode(mode) {
            if (mode === currentMode) return;
            currentMode = mode;
            document.getElementById('btnComplet').classList.toggle('active', mode === 'complet');
            document.getElementById('btnRapide').classList.toggle('active',  mode === 'rapide');
            if (enigmes.length > 0) {
                document.getElementById('btnComplet').textContent = `🗂 Complet (${enigmes.length})`;
            }
            startSession();
        }

        function buildPool() {
            return currentMode === 'rapide' ? shuffle(enigmes).slice(0, QUICK_COUNT) : [...enigmes];
        }

        /* ── Session ──────────────────────────────────────────── */
        function startSession() {
            activePool    = buildPool();
            playedEnigmes = [];
            totalScore    = 0;
            updateScoreDisplay();
            newEnigme();
        }

        async function loadEnigmes() {
            try {
                const r = await fetch('/api/geopfe');
                if (!r.ok) throw new Error(`HTTP error! status: ${r.status}`);
                enigmes = await r.json();

                document.getElementById('loading').style.display      = 'none';
                document.getElementById('gameContainer').style.display = 'block';

                document.getElementById('btnComplet').textContent = `🗂 Complet (${enigmes.length})`;

                initMap();
                startSession();
            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerHTML = '⚠️ Erreur de chargement des énigmes';
            }
        }

        function newEnigme() {
            if (activePool.length === 0) return;

            if (playedEnigmes.length >= activePool.length) {
                const finalScore = totalScore;
                const label = currentMode === 'rapide'
                    ? `Mode Rapide (${QUICK_COUNT} énigmes)`
                    : `Mode Complet (${enigmes.length} énigmes)`;
                alert(`🎉 Session terminée !\n${label}\n\nScore final : ${finalScore} pts\n\nBravo !`);
                startSession();
                return;
            }

            // Clean up previous round markers
            if (guessMarker)  { map.removeLayer(guessMarker);  guessMarker  = null; }
            if (answerMarker) { map.removeLayer(answerMarker); answerMarker = null; }
            if (guessLine)    { map.removeLayer(guessLine);    guessLine    = null; }

            // Reset UI
            document.getElementById('resultCard').classList.remove('show');
            document.getElementById('btnValider').disabled = true;
            document.getElementById('btnValider').style.display = '';
            document.getElementById('btnNext').classList.remove('show');
            document.getElementById('hintLabel').textContent = 'Cliquez sur la carte pour poser votre pin 📍';
            document.getElementById('hintLabel').classList.remove('placed');

            // Reset map view
            map.setView([20, 10], 2);

            // Pick enigma
            const available   = activePool.filter(e => !playedEnigmes.some(p => p.reponse === e.reponse));
            currentEnigme     = available[Math.floor(Math.random() * available.length)];
            playedEnigmes.push(currentEnigme);

            document.getElementById('questionLabel').innerHTML =
                `Où se situe le PFE de <strong>${currentEnigme.reponse}</strong> ?`;

            updateScoreDisplay();
        }

        /* ── Validate ─────────────────────────────────────────── */
        function validateGuess() {
            if (!guessMarker) return;

            const gLatLng  = guessMarker.getLatLng();
            const aLat     = currentEnigme.y;   // Nord
            const aLng     = currentEnigme.x;   // Est

            const distKm   = haversineKm(gLatLng.lat, gLatLng.lng, aLat, aLng);
            const roundScore = calculateScore(distKm);
            totalScore += roundScore;

            // Place answer marker
            answerMarker = L.marker([aLat, aLng], { icon: answerIcon() })
                .bindTooltip(currentEnigme.reponse, { permanent: true, direction: 'top', offset: [0, -36] })
                .addTo(map);

            // Draw line between guess and answer
            guessLine = L.polyline(
                [[gLatLng.lat, gLatLng.lng], [aLat, aLng]],
                { color: '#e74c3c', weight: 2, dashArray: '6 4', opacity: 0.8 }
            ).addTo(map);

            // Fit map to both markers
            const bounds = L.latLngBounds(
                [gLatLng.lat, gLatLng.lng],
                [aLat, aLng]
            ).pad(0.3);
            map.fitBounds(bounds);

            // Show result card
            const resultCard = document.getElementById('resultCard');
            document.getElementById('resultDistance').textContent =
                `📏 ${formatDistance(distKm)} de la cible`;
            document.getElementById('resultScore').textContent =
                `+${roundScore} points 🎯`;
            document.getElementById('resultName').textContent =
                `La bonne réponse était : ${currentEnigme.reponse}`;
            resultCard.classList.add('show');

            updateScoreDisplay();

            // Victory color if very close (< 200km)
            if (distKm < 200) document.body.classList.add('victory');

            // Swap buttons
            document.getElementById('btnValider').style.display = 'none';
            document.getElementById('btnNext').classList.add('show');
        }

        loadEnigmes();
    </script>
</body>
</html>
