<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPFE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px; padding-top: 80px; gap: 20px;
        }
        body.victory { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); transition: background 0.5s ease; }

        .nav-bar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: white; border-radius: 50px; padding: 10px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); display: flex; gap: 10px; z-index: 9999;
        }
        .nav-bar a { text-decoration: none; color: #2c3e50; padding: 8px 20px; border-radius: 25px; font-weight: 600; transition: all 0.3s; }
        .nav-bar a:hover { background: #f8f9fa; }
        .nav-bar a.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

        .container { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 760px; width: 100%; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; font-size: 2em; }

        .mode-toggle { display: flex; justify-content: center; margin-bottom: 20px; }
        .mode-toggle-inner { display: flex; background: #f0f0f5; border-radius: 30px; padding: 4px; gap: 4px; }
        .mode-btn { padding: 8px 22px; border-radius: 25px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s ease; background: transparent; color: #6c757d; }
        .mode-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; box-shadow: 0 3px 10px rgba(102,126,234,0.4); }
        .mode-btn:hover:not(.active) { background: #e0e0ea; color: #2c3e50; }

        .score-display { text-align: center; color: #667eea; font-size: 18px; font-weight: bold; margin-bottom: 16px; padding: 10px; background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); border-radius: 10px; }
        .score-badge { display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 4px 14px; border-radius: 20px; font-size: 17px; margin-left: 8px; }

        .question-label { text-align: center; font-size: 1.05em; color: #6c757d; margin-bottom: 12px; font-style: italic; }
        .question-label strong { color: #2c3e50; font-style: normal; font-size: 1.15em; }
        .hint-label { text-align: center; font-size: 0.9em; color: #95a5a6; margin-bottom: 10px; min-height: 1.2em; transition: color 0.3s; }
        .hint-label.placed { color: #667eea; font-weight: 600; }

        #map { width: 100%; height: 420px; border-radius: 14px; border: 3px solid #e9ecef; margin-bottom: 16px; cursor: crosshair; }

        .result-card { display: none; background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; text-align: center; animation: fadeIn 0.4s ease; }
        .result-card.show { display: block; }
        .result-card .distance { font-size: 1.5em; font-weight: 700; color: #2c3e50; margin-bottom: 4px; }
        .result-card .round-score { font-size: 1.1em; color: #667eea; font-weight: 600; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        .button-row { display: flex; gap: 10px; }
        .btn-submit, .btn-next { flex: 1; padding: 14px; font-size: 16px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; }
        .btn-submit:hover, .btn-next:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-submit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-submit:disabled { background: #ced4da; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-next { background: #2ecc71; color: white; display: none; }
        .btn-next.show { display: flex; align-items: center; justify-content: center; }

        .loading { text-align: center; color: white; font-size: 1.5em; }

        /* ── Leaderboard ───────────────────────────────────────── */
        .leaderboard-panel { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 760px; width: 100%; }
        .leaderboard-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .leaderboard-header h3 { color: #2c3e50; font-size: 1.2em; }
        .lb-refresh-btn { background: none; border: 2px solid #e9ecef; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 14px; color: #6c757d; transition: all 0.2s; }
        .lb-refresh-btn:hover { border-color: #667eea; color: #667eea; }
        .lb-refresh-btn.spinning { animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .leaderboard-tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .lb-tab { padding: 6px 18px; border-radius: 20px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: #f0f0f5; color: #6c757d; transition: all 0.2s; }
        .lb-tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

        .lb-search-container { position: relative; margin-bottom: 15px; }
        .lb-search-container input { width: 100%; padding: 10px 36px 10px 38px; font-size: 14px; border: 2px solid #dee2e6; border-radius: 10px; outline: none; transition: border-color 0.3s; }
        .lb-search-container input:focus { border-color: #667eea; }
        .lb-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #adb5bd; font-size: 16px; pointer-events: none; }
        .lb-clear-btn { display: none; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #adb5bd; font-size: 18px; line-height: 1; padding: 2px 4px; }
        .lb-clear-btn.visible { display: block; }
        .lb-clear-btn:hover { color: #667eea; }

        .lb-player-card { display: none; background: linear-gradient(135deg, #667eea10 0%, #764ba215 100%); border: 2px solid #667eea40; border-radius: 12px; padding: 14px 16px; margin-bottom: 15px; animation: fadeIn2 0.3s ease; }
        .lb-player-card.show { display: block; }
        @keyframes fadeIn2 { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
        .lb-player-card-name { font-size: 16px; font-weight: 700; color: #2c3e50; margin-bottom: 8px; }
        .lb-player-stats { display: flex; flex-wrap: wrap; gap: 10px; }
        .lb-stat-chip { background: white; border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: 600; color: #667eea; border: 1px solid #667eea30; }
        .lb-stat-chip.gold  { color: #f39c12; border-color: #f39c1230; }
        .lb-stat-chip.green { color: #2ecc71; border-color: #2ecc7130; }

        .leaderboard-table { width: 100%; border-collapse: collapse; }
        .leaderboard-table th { text-align: left; padding: 8px 10px; color: #95a5a6; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #f0f0f5; }
        .leaderboard-table td { padding: 10px; border-bottom: 1px solid #f8f9fa; font-size: 14px; color: #2c3e50; }
        .leaderboard-table tr:last-child td { border-bottom: none; }
        .leaderboard-table tr.highlighted td { background: #667eea10; }
        .lb-rank { font-weight: 700; width: 36px; color: #667eea; }
        .lb-rank-1 { color: #f39c12; } .lb-rank-2 { color: #95a5a6; } .lb-rank-3 { color: #cd7f32; }
        .lb-score { font-weight: 700; color: #2ecc71; text-align: right; }
        .lb-date  { color: #bdc3c7; font-size: 12px; text-align: right; }
        .lb-empty, .lb-no-match { text-align: center; color: #95a5a6; font-style: italic; padding: 20px; }
        .lb-status { text-align: center; font-size: 13px; color: #95a5a6; padding: 4px; min-height: 20px; }

        /* ── End modal ─────────────────────────────────────────── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 4000; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: white; border-radius: 20px; padding: 40px; max-width: 420px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { transform:scale(0.8); opacity:0; } to { transform:scale(1); opacity:1; } }
        .modal-box h2 { font-size: 2em; margin-bottom: 10px; }
        .modal-box .final-score { font-size: 3em; font-weight: 700; background: linear-gradient(135deg,#667eea,#764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 15px 0; }
        .modal-box p { color: #6c757d; margin-bottom: 20px; }
        .modal-box input[type="text"] { width: 100%; padding: 12px 15px; font-size: 16px; border: 2px solid #dee2e6; border-radius: 10px; outline: none; margin-bottom: 10px; }
        .modal-box input[type="text"]:focus { border-color: #667eea; }
        .modal-save-status { font-size: 13px; min-height: 20px; margin-bottom: 10px; color: #6c757d; }
        .modal-save-status.error   { color: #e74c3c; }
        .modal-save-status.success { color: #2ecc71; }
        .modal-buttons { display: flex; gap: 10px; }
        .btn-save-score { flex: 1; padding: 12px; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; }
        .btn-save-score:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .btn-save-score:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-skip-score { padding: 12px 20px; background: #f0f0f5; color: #6c757d; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-skip-score:hover { background: #e0e0ea; }

        @media (max-width: 600px) { .container { padding: 16px; } h1 { font-size: 1.5em; } #map { height: 300px; } }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html">PFEmoji</a>
        <a href="pfe-image.html">PFE-Image</a>
        <a href="geopfe.html" class="active">GeoPFE</a>
    </div>

    <div class="loading" id="loading">Chargement des énigmes...</div>

    <div class="container" style="display:none" id="gameContainer">
        <h1>🌍 GeoPFE</h1>
        <div class="mode-toggle">
            <div class="mode-toggle-inner">
                <button class="mode-btn active" id="btnComplet" onclick="setMode('complet')">🗂 Complet</button>
                <button class="mode-btn"         id="btnRapide"  onclick="setMode('rapide')">⚡ Rapide (10)</button>
            </div>
        </div>
        <div class="score-display">
            Score : <span class="score-badge" id="scoreValue">0</span>
            <span style="margin-left:20px;font-size:15px;color:#6c757d">
                Énigmes résolues : <span id="resolvedCount">0</span>/<span id="totalCount">0</span>
            </span>
        </div>
        <div class="question-label" id="questionLabel">Chargement...</div>
        <div class="hint-label"     id="hintLabel">Cliquez sur la carte pour poser votre pin 📍</div>
        <div id="map"></div>
        <div class="result-card" id="resultCard">
            <div class="distance"    id="resultDistance"></div>
            <div class="round-score" id="resultScore"></div>
        </div>
        <div class="button-row">
            <button class="btn-submit" id="btnValider" onclick="validateGuess()" disabled>Valider</button>
            <button class="btn-next"   id="btnNext"    onclick="newEnigme()">Suivant !</button>
        </div>
    </div>

    <!-- Leaderboard -->
    <div class="leaderboard-panel" style="display:none" id="leaderboardPanel">
        <div class="leaderboard-header">
            <h3>🏆 Classement</h3>
            <button class="lb-refresh-btn" id="refreshBtn" onclick="refreshLeaderboard()">🔄 Actualiser</button>
        </div>
        <div class="leaderboard-tabs">
            <button class="lb-tab active" id="lbTabComplet" onclick="showLeaderboard('complet')">🗂 Complet</button>
            <button class="lb-tab"        id="lbTabRapide"  onclick="showLeaderboard('rapide')">⚡ Rapide</button>
        </div>
        <div class="lb-search-container">
            <span class="lb-search-icon">🔍</span>
            <input type="text" id="lbSearch" placeholder="Chercher un joueur..." autocomplete="off" oninput="onSearchInput()">
            <button class="lb-clear-btn" id="lbClearBtn" onclick="clearSearch()">×</button>
        </div>
        <div class="lb-player-card" id="playerCard"></div>
        <div class="lb-status" id="lbStatus"></div>
        <table class="leaderboard-table">
            <thead><tr><th>#</th><th>Nom</th><th style="text-align:right">Score</th><th style="text-align:right">Date</th></tr></thead>
            <tbody id="leaderboardBody"><tr><td colspan="4" class="lb-empty">Chargement...</td></tr></tbody>
        </table>
    </div>

    <!-- End modal -->
    <div class="modal-overlay" id="endModal">
        <div class="modal-box">
            <h2>🎊 Session terminée !</h2>
            <div class="final-score" id="modalScore">0</div>
            <p id="modalMode"></p>
            <p>Entre ton prénom pour sauvegarder ton score :</p>
            <input type="text" id="playerNameInput" placeholder="Ton prénom..." maxlength="20" autocomplete="off">
            <div class="modal-save-status" id="modalSaveStatus"></div>
            <div class="modal-buttons">
                <button class="btn-save-score" id="btnSave" onclick="saveScore()">💾 Sauvegarder</button>
                <button class="btn-skip-score" onclick="skipScore()">Passer</button>
            </div>
        </div>
    </div>

    <script>
        /* ── Supabase ──────────────────────────────────────────── */
        const SUPABASE_URL = 'https://pyeuyaeatfwbjnsjxgcq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5ZXV5YWVhdGZ3Ympuc2p4Z2NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTA1NDksImV4cCI6MjA5MzIyNjU0OX0.rNI2djL3-3-y-_nOd5Zl6I_cKl9aBlUhfZWF2Or1Tzg';
        const SB_HEADERS   = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };
        const LB_TABLE     = 'leaderboard_geo';

        /* ── State ─────────────────────────────────────────────── */
        let enigmes       = [];
        let activePool    = [];
        let currentEnigme = null;
        let playedEnigmes = [];
        let totalScore    = 0;
        let currentMode   = 'complet';
        let guessMarker   = null;
        let answerMarker  = null;
        let guessLine     = null;
        let map           = null;

        let lbCache      = [];
        let lbActiveMode = 'complet';

        const QUICK_COUNT = 10;

        /* ── Map init ──────────────────────────────────────────── */
        function initMap() {
            map = L.map('map', { center:[46.5,2.5], zoom:5, minZoom:1, maxZoom:15, worldCopyJump:true });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap contributors' }).addTo(map);
            map.on('click', onMapClick);
        }

        function onMapClick(e) {
            if (document.getElementById('btnNext').classList.contains('show')) return;
            const {lat,lng} = e.latlng;
            if (guessMarker) guessMarker.setLatLng([lat,lng]);
            else guessMarker = L.marker([lat,lng],{icon:guessIcon()}).addTo(map);
            document.getElementById('btnValider').disabled = false;
            document.getElementById('hintLabel').textContent = '📍 Pin posé — cliquez encore pour déplacer, ou validez !';
            document.getElementById('hintLabel').classList.add('placed');
        }

        function guessIcon() {
            return L.divIcon({ className:'', html:`<div style="width:32px;height:32px;border-radius:50% 50% 50% 0;background:linear-gradient(135deg,#667eea,#764ba2);border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,0.3);transform:rotate(-45deg);"></div>`, iconSize:[32,32], iconAnchor:[16,32] });
        }
        function answerIcon() {
            return L.divIcon({ className:'', html:`<div style="width:32px;height:32px;border-radius:50% 50% 50% 0;background:linear-gradient(135deg,#2ecc71,#27ae60);border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,0.3);transform:rotate(-45deg);"></div>`, iconSize:[32,32], iconAnchor:[16,32] });
        }

        /* ── Score ─────────────────────────────────────────────── */
        function calculateScore(distKm) {
            const d = distKm * 1000;
            if (d <= 100) return 5000;
            return Math.max(0, Math.round(5000 * Math.exp(-(d-100)/150000)));
        }
        function haversineKm(lat1,lon1,lat2,lon2) {
            const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
            const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        }
        function formatDistance(km) {
            if (km<1)   return `${Math.round(km*1000)} m`;
            if (km<100) return `${km.toFixed(1)} km`;
            return `${Math.round(km)} km`;
        }
        function updateScoreDisplay() {
            document.getElementById('scoreValue').textContent    = totalScore;
            document.getElementById('resolvedCount').textContent = Math.max(0, playedEnigmes.length - 1);
            document.getElementById('totalCount').textContent    = activePool.length;
        }

        /* ── Helpers ───────────────────────────────────────────── */
        function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
        function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        /* ── Mode ──────────────────────────────────────────────── */
        function setMode(mode) {
            if (mode===currentMode) return;
            currentMode=mode;
            document.getElementById('btnComplet').classList.toggle('active', mode==='complet');
            document.getElementById('btnRapide').classList.toggle('active',  mode==='rapide');
            if (enigmes.length>0) document.getElementById('btnComplet').textContent=`🗂 Complet (${enigmes.length})`;
            startSession();
        }
        function buildPool() { return currentMode==='rapide'?shuffle(enigmes).slice(0,QUICK_COUNT):[...enigmes]; }

        /* ── Session ───────────────────────────────────────────── */
        function startSession() { activePool=buildPool(); playedEnigmes=[]; totalScore=0; updateScoreDisplay(); newEnigme(); }

        async function loadEnigmes() {
            try {
                const r = await fetch('/api/geopfe');
                if (!r.ok) throw new Error();
                enigmes = await r.json();
                document.getElementById('loading').style.display          = 'none';
                document.getElementById('gameContainer').style.display    = 'block';
                document.getElementById('leaderboardPanel').style.display = 'block';
                document.getElementById('btnComplet').textContent = `🗂 Complet (${enigmes.length})`;
                initMap();
                await fetchLeaderboard();
                startSession();
            } catch { document.getElementById('loading').textContent='⚠️ Erreur de chargement des énigmes'; }
        }

        function newEnigme() {
            if (activePool.length===0) return;

            // ✅ FIX dernière énigme : vérifier AVANT de piocher
            const remaining = activePool.filter(e => !playedEnigmes.some(p => p.reponse===e.reponse));
            if (remaining.length===0) { showEndModal(); return; }

            // Nettoyer la carte
            if (guessMarker)  { map.removeLayer(guessMarker);  guessMarker=null; }
            if (answerMarker) { map.removeLayer(answerMarker); answerMarker=null; }
            if (guessLine)    { map.removeLayer(guessLine);    guessLine=null; }

            document.body.classList.remove('victory');
            document.getElementById('resultCard').classList.remove('show');
            document.getElementById('btnValider').disabled=true;
            document.getElementById('btnValider').style.display='';
            document.getElementById('btnNext').classList.remove('show');
            document.getElementById('hintLabel').textContent='Cliquez sur la carte pour poser votre pin 📍';
            document.getElementById('hintLabel').classList.remove('placed');
            map.setView([46.5,2.5],5);

            currentEnigme = remaining[Math.floor(Math.random()*remaining.length)];
            playedEnigmes.push(currentEnigme);

            document.getElementById('questionLabel').innerHTML =
                `Où se situe le PFE de <strong>${currentEnigme.reponse}</strong> ?`;
            updateScoreDisplay();
        }

        /* ── Validate ──────────────────────────────────────────── */
        function validateGuess() {
            if (!guessMarker) return;
            const gLL=guessMarker.getLatLng();
            const aLat=currentEnigme.y, aLng=currentEnigme.x;
            const distKm=haversineKm(gLL.lat,gLL.lng,aLat,aLng);
            const roundScore=calculateScore(distKm);
            totalScore+=roundScore;

            answerMarker=L.marker([aLat,aLng],{icon:answerIcon()})
                .bindTooltip(currentEnigme.reponse,{permanent:true,direction:'top',offset:[0,-36]})
                .addTo(map);
            guessLine=L.polyline([[gLL.lat,gLL.lng],[aLat,aLng]],{color:'#e74c3c',weight:2,dashArray:'6 4',opacity:0.8}).addTo(map);
            map.fitBounds(L.latLngBounds([gLL.lat,gLL.lng],[aLat,aLng]).pad(0.3));

            document.getElementById('resultDistance').textContent=`📏 ${formatDistance(distKm)} de la cible`;
            document.getElementById('resultScore').textContent=`+${roundScore} points 🎯`;
            document.getElementById('hintLabel').textContent='';
            document.getElementById('hintLabel').classList.remove('placed');
            document.getElementById('resultCard').classList.add('show');

            updateScoreDisplay();
            if (distKm<200) document.body.classList.add('victory');

            document.getElementById('btnValider').style.display='none';
            document.getElementById('btnNext').classList.add('show');
        }

        /* ── Supabase leaderboard ──────────────────────────────── */
        async function fetchLeaderboard(silent=false) {
            if (!silent) setLbStatus('Chargement...');
            try {
                const res=await fetch(`${SUPABASE_URL}/rest/v1/${LB_TABLE}?select=*&order=score.desc&limit=200`,{headers:SB_HEADERS});
                if (!res.ok) throw new Error('HTTP '+res.status);
                lbCache=await res.json(); renderLeaderboard(lbActiveMode); setLbStatus('');
            } catch(err){console.error(err);setLbStatus('⚠️ Impossible de charger le classement');}
        }
        async function postScore(name,score,mode) {
            const date=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'});
            const res=await fetch(`${SUPABASE_URL}/rest/v1/${LB_TABLE}`,{method:'POST',headers:{...SB_HEADERS,'Content-Type':'application/json'},body:JSON.stringify({name,score,mode,date})});
            if (!res.ok) throw new Error('Erreur serveur');
        }
        async function refreshLeaderboard(){const btn=document.getElementById('refreshBtn');btn.classList.add('spinning');await fetchLeaderboard();btn.classList.remove('spinning');}

        /* ── Leaderboard render ────────────────────────────────── */
        function renderLeaderboard(mode) {
            lbActiveMode=mode;
            document.getElementById('lbTabComplet').classList.toggle('active',mode==='complet');
            document.getElementById('lbTabRapide').classList.toggle('active', mode==='rapide');
            const query=normalize(document.getElementById('lbSearch').value);
            const modeData=lbCache.filter(e=>e.mode===mode).sort((a,b)=>b.score-a.score);
            renderPlayerCard(query,modeData); renderTable(query,modeData);
        }
        function normalize(s){return s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
        function showLeaderboard(mode){renderLeaderboard(mode);}
        function renderTable(query,modeData){
            const tbody=document.getElementById('leaderboardBody');
            if(modeData.length===0){tbody.innerHTML='<tr><td colspan="4" class="lb-empty">Aucun score enregistré</td></tr>';return;}
            const top=modeData.slice(0,10);
            const matchIdx=query?modeData.findIndex(e=>normalize(e.name).includes(query)):-1;
            if(query&&matchIdx===-1){tbody.innerHTML=top.map((e,i)=>rowHtml(e,i,false)).join('')+`<tr><td colspan="4" class="lb-no-match">« ${escapeHtml(document.getElementById('lbSearch').value)} » introuvable</td></tr>`;return;}
            const extended=matchIdx>=10?modeData.slice(0,matchIdx+1):top;
            tbody.innerHTML=extended.map((e,i)=>rowHtml(e,i,query&&normalize(e.name).includes(query))).join('');
        }
        function rowHtml(entry,i,highlight){
            const rankClass=i<3?`lb-rank lb-rank-${i+1}`:'lb-rank';
            const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
            return `<tr class="${highlight?'highlighted':''}"><td class="${rankClass}">${medal}</td><td>${escapeHtml(entry.name)}</td><td class="lb-score">${entry.score}</td><td class="lb-date">${entry.date||''}</td></tr>`;
        }
        function renderPlayerCard(query,modeData){
            const card=document.getElementById('playerCard');
            if(!query){card.classList.remove('show');return;}
            const matches=modeData.map((e,i)=>({...e,rank:i+1})).filter(e=>normalize(e.name).includes(query));
            if(matches.length===0){card.classList.remove('show');return;}
            const grouped={};
            matches.forEach(e=>{const k=normalize(e.name);if(!grouped[k])grouped[k]={name:e.name,entries:[]};grouped[k].entries.push(e);});
            card.innerHTML=Object.values(grouped).map(g=>{
                const best=g.entries[0],total=g.entries.reduce((s,e)=>s+e.score,0),games=g.entries.length;
                return `<div class="lb-player-card-name">👤 ${escapeHtml(best.name)}</div><div class="lb-player-stats"><span class="lb-stat-chip gold">🏅 Rang #${best.rank}</span><span class="lb-stat-chip green">⭐ Meilleur : ${best.score} pts</span><span class="lb-stat-chip">🎮 ${games} partie${games>1?'s':''}</span>${games>1?`<span class="lb-stat-chip">📊 Total : ${total} pts</span>`:''}</div>`;
            }).join('<hr style="border:none;border-top:1px solid #e9ecef;margin:10px 0">');
            card.classList.add('show');
        }
        function setLbStatus(msg){document.getElementById('lbStatus').textContent=msg;}

        /* ── Search ────────────────────────────────────────────── */
        function onSearchInput(){const v=document.getElementById('lbSearch').value;document.getElementById('lbClearBtn').classList.toggle('visible',v.length>0);renderLeaderboard(lbActiveMode);}
        function clearSearch(){document.getElementById('lbSearch').value='';document.getElementById('lbClearBtn').classList.remove('visible');document.getElementById('playerCard').classList.remove('show');renderLeaderboard(lbActiveMode);}

        /* ── End modal ─────────────────────────────────────────── */
        function showEndModal(){
            document.getElementById('modalScore').textContent     =`${totalScore} pts`;
            document.getElementById('modalMode').textContent      =currentMode==='rapide'?`⚡ Mode Rapide — ${QUICK_COUNT} énigmes`:`🌍 Mode Complet — ${enigmes.length} énigmes`;
            document.getElementById('playerNameInput').value      ='';
            document.getElementById('modalSaveStatus').textContent='';
            document.getElementById('modalSaveStatus').className  ='modal-save-status';
            document.getElementById('btnSave').disabled           =false;
            document.getElementById('btnSave').textContent        ='💾 Sauvegarder';
            document.getElementById('endModal').classList.add('show');
            setTimeout(()=>document.getElementById('playerNameInput').focus(),100);
        }
        async function saveScore(){
            const name=document.getElementById('playerNameInput').value.trim();
            const btn=document.getElementById('btnSave'),status=document.getElementById('modalSaveStatus');
            if(!name){status.textContent='Entre ton prénom pour continuer.';status.className='modal-save-status error';document.getElementById('playerNameInput').focus();return;}
            btn.disabled=true;btn.textContent='⏳ Sauvegarde...';status.textContent='';
            try{
                await postScore(name,totalScore,currentMode);
                status.textContent='✅ Score sauvegardé !';status.className='modal-save-status success';
                await fetchLeaderboard(true);showLeaderboard(currentMode);
                document.getElementById('lbSearch').value=name;
                document.getElementById('lbClearBtn').classList.add('visible');
                renderLeaderboard(currentMode);
                setTimeout(closeModal,1000);
            }catch(err){status.textContent='⚠️ '+err.message;status.className='modal-save-status error';btn.disabled=false;btn.textContent='💾 Sauvegarder';}
        }
        function skipScore(){closeModal();}
        function closeModal(){document.getElementById('endModal').classList.remove('show');startSession();}

        document.getElementById('playerNameInput').addEventListener('keypress',e=>{if(e.key==='Enter')saveScore();});

        loadEnigmes();
    </script>
</body>
</html>
