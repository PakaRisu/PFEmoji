<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PFEmoji</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 20px;
        }

        body.victory {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            transition: background 0.5s ease;
        }

        body.error {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            transition: background 0.3s ease;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            flex-shrink: 0;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .emoji-display {
            background: #f8f9fa;
            border: 3px solid #e9ecef;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .emoji-display span {
            font-size: 60px;
            margin: 0 8px;
            font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', 'Android Emoji', sans-serif;
        }

        .attempts {
            text-align: center;
            color: #6c757d;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .score-display {
            text-align: center;
            color: #667eea;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 10px;
        }

        .score-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 18px;
            margin-left: 10px;
        }

        .input-container {
            position: relative;
            margin-bottom: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #dee2e6;
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .suggestions.show {
            display: block;
        }

        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .suggestion-item:hover {
            background-color: #f8f9fa;
        }

        .suggestion-item:active {
            background-color: #e9ecef;
        }

        .button-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .secondary-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-new {
            background: #2ecc71;
            color: white;
        }

        .history-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-panel h3 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.2em;
            text-align: center;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .history-item {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 4px solid #e74c3c;
            color: #2c3e50;
            font-size: 14px;
            animation: slideIn 0.3s ease;
            display: inline-block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .history-empty {
            text-align: center;
            color: #95a5a6;
            font-style: italic;
            padding: 20px;
            width: 100%;
        }

        .victory-message {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            z-index: 3000;
            padding: 30px 20px;
            background: rgba(46, 204, 113, 0.95);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: victorySlideDown 0.5s ease;
        }

        .victory-message.show {
            display: block;
        }

        .victory-message h2 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .victory-message p {
            font-size: 1.3em;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        @keyframes victorySlideDown {
            0% {
                transform: translateY(-100%);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.5em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .emoji-display span {
                font-size: 45px;
            }

            .history-panel {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">Chargement des énigmes...</div>

    <div class="container" style="display: none;" id="gameContainer">
        <h1>PFEmoji</h1>
        
        <div class="emoji-display" id="emojiDisplay">
            <span>❓</span>
        </div>
        
        <div class="attempts" id="attemptsCounter">Essais : 0</div>
        
        <div class="input-container">
            <input 
                type="text" 
                id="answerInput" 
                placeholder="C'est évidemment le PFE de ..."
                autocomplete="off"
            >
            <div class="suggestions" id="suggestionsBox"></div>
        </div>
        
        <div class="button-container">
            <button class="btn-submit" onclick="checkAnswer()">Valider</button>
        </div>
        
        <div class="secondary-buttons">
            <button class="btn-new" onclick="newEnigme()">Un autre !</button>
        </div>
    </div>

    <div class="history-panel" style="display: none;" id="historyPanel">
        <h3>Ce n'est pas le PFE de...</h3>
        <div class="history-list" id="historyList">
            <div class="history-empty">Aucune tentative</div>
        </div>
    </div>

    <div class="victory-message" id="victoryMessage">
        <h2>🎉</h2>
        <p id="victoryText"></p>
        <p id="victoryAttempts"></p>
    </div>

    <script>
        let enigmes = [];
        let currentEnigme = null;
        let revealed = 0;
        let attempts = 0;
        let allAnswers = [];
        let guessHistory = [];
        let playedEnigmes = []; // Énigmes déjà jouées dans cette session
        let totalScore = 0; // Score total de la session
        
        // Messages dynamiques pour le placeholder
        const placeholderMessages = [
            "C'est évidemment le PFE de...",
            "Ah, plutôt le PFE de...",
            "Alors peut-être celui de...",
            "Ah non mince, bon bah c'est...",
            "Hmm... Le PFE de...",
            "Attends, c'est...",
            "Ça doit être...",
            "Peut-être bien...",
            "Ça doit être...",
            "Evidemment parce que c'est le PFE de ...",
            "Non là tu fais aucun effort mon reuf..."
        ];

        function updatePlaceholder() {
            const input = document.getElementById('answerInput');
            if (attempts >= 14) {
                // À partir du 15ème essai
                input.placeholder = placeholderMessages[14];
            } else if (attempts < placeholderMessages.length - 1) {
                input.placeholder = placeholderMessages[attempts];
            } else {
                input.placeholder = placeholderMessages[Math.min(attempts, placeholderMessages.length - 2)];
            }
        }

        function calculateScore(attemptsUsed, totalEmojis) {
            // Si trouvé en 1 essai : 100 + (nombre d'emojis * 50)
            if (attemptsUsed === 1) {
                return 100 + (totalEmojis * 50);
            }
            
            // Sinon : score de base 100, -20 par essai supplémentaire (minimum 0)
            const baseScore = 100;
            const penalty = (attemptsUsed - 1) * 20;
            return Math.max(0, baseScore - penalty);
        }

        function updateScoreDisplay() {
            document.getElementById('scoreValue').textContent = totalScore;
        }

        function normalize(str) {
            return str.trim().toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "");
        }

        // Charger les énigmes depuis l'API
        async function loadEnigmes() {
            try {
                const response = await fetch('/api/enigmes');
                if (!response.ok) {
                    throw new Error('Erreur de chargement');
                }
                enigmes = await response.json();
                allAnswers = enigmes.map(e => e.reponse);
                
                // Masquer le loading, afficher le jeu
                document.getElementById('loading').style.display = 'none';
                document.getElementById('gameContainer').style.display = 'block';
                document.getElementById('historyPanel').style.display = 'block';
                
                initGame();
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('loading').textContent = '⚠️ Erreur de chargement des énigmes';
            }
        }

        function initGame() {
            if (enigmes.length === 0) {
                alert("⚠️ Aucune énigme trouvée !");
                return;
            }
            newEnigme();
        }

        function newEnigme() {
            if (enigmes.length === 0) {
                alert("Aucune énigme disponible");
                return;
            }
            
            // Réinitialiser si toutes les énigmes ont été jouées
            if (playedEnigmes.length >= enigmes.length) {
                playedEnigmes = [];
                alert("🎉 Vous avez terminé toutes les énigmes ! On recommence !");
            }
            
            // Filtrer les énigmes non jouées
            const availableEnigmes = enigmes.filter(e => 
                !playedEnigmes.some(played => played.reponse === e.reponse)
            );
            
            if (availableEnigmes.length === 0) {
                playedEnigmes = [];
                return newEnigme();
            }
            
            document.body.classList.remove('victory');
            document.getElementById('victoryMessage').classList.remove('show');
            
            // Choisir une énigme non jouée
            currentEnigme = availableEnigmes[Math.floor(Math.random() * availableEnigmes.length)];
            playedEnigmes.push(currentEnigme);
            
            revealed = 1;
            attempts = 0;
            guessHistory = [];
            updateHistoryDisplay();
            updatePlaceholder();
            document.getElementById('answerInput').value = '';
            updateDisplay();
            document.getElementById('answerInput').focus();
            hideSuggestions();
        }

        function updateDisplay() {
            const display = document.getElementById('emojiDisplay');
            const emojis = currentEnigme.emojis;
            const shown = emojis.slice(0, revealed).map(e => `<span>${e}</span>`).join('');
            const hidden = Array(emojis.length - revealed).fill('<span>❓</span>').join('');
            display.innerHTML = shown + hidden;
            document.getElementById('attemptsCounter').textContent = `Essais : ${attempts}`;
        }

        function updateHistoryDisplay() {
            const historyList = document.getElementById('historyList');
            
            if (guessHistory.length === 0) {
                historyList.innerHTML = '<div class="history-empty">Aucune tentative</div>';
            } else {
                historyList.innerHTML = guessHistory
                    .map(guess => `<div class="history-item">${guess}</div>`)
                    .join('');
            }
        }

        function checkAnswer() {
            const input = document.getElementById('answerInput');
            let userAnswer = input.value.trim();
            
            if (!userAnswer) return;
            
            const typed = normalize(userAnswer);
            const matches = allAnswers.filter(ans => normalize(ans).startsWith(typed));
            
            if (matches.length === 1) {
                userAnswer = matches[0];
                input.value = userAnswer;
            }
            
            attempts++;
            
            if (normalize(userAnswer) === normalize(currentEnigme.reponse)) {
                const display = document.getElementById('emojiDisplay');
                display.innerHTML = currentEnigme.emojis.map(e => `<span>${e}</span>`).join('');
                document.getElementById('attemptsCounter').textContent = `Essais : ${attempts}`;
                
                hideSuggestions();
                showVictory();
            } else {
                if (!guessHistory.includes(userAnswer)) {
                    guessHistory.push(userAnswer);
                    updateHistoryDisplay();
                }
                
                document.body.classList.add('error');
                setTimeout(() => {
                    document.body.classList.remove('error');
                }, 500);
                
                if (revealed < currentEnigme.emojis.length) {
                    revealed++;
                }
                updateDisplay();
                input.value = '';
                hideSuggestions();
            }
        }

        function showSuggestions() {
            const input = document.getElementById('answerInput');
            const typed = normalize(input.value);
            const suggestionsBox = document.getElementById('suggestionsBox');
            
            if (!typed) {
                hideSuggestions();
                return;
            }
            
            // Filtrer les suggestions : exclure les noms déjà testés
            const matches = allAnswers.filter(ans => 
                normalize(ans).startsWith(typed) && 
                !guessHistory.includes(ans)
            );
            
            if (matches.length === 0) {
                hideSuggestions();
                return;
            }
            
            suggestionsBox.innerHTML = matches.map(ans => 
                `<div class="suggestion-item" onclick="selectSuggestion('${ans.replace(/'/g, "\\'")}')">${ans}</div>`
            ).join('');
            
            suggestionsBox.classList.add('show');
        }

        function hideSuggestions() {
            document.getElementById('suggestionsBox').classList.remove('show');
        }

        function selectSuggestion(answer) {
            document.getElementById('answerInput').value = answer;
            hideSuggestions();
            document.getElementById('answerInput').focus();
        }

        function showVictory(roundScore) {
            document.body.classList.add('victory');
            
            const victoryMsg = document.getElementById('victoryMessage');
            document.getElementById('victoryText').textContent = `Bravo ! C'était bien le PFE de ${currentEnigme.reponse}`;
            document.getElementById('victoryAttempts').textContent = `Trouvé en ${attempts} coup(s) ! +${roundScore} points 🎯`;
            victoryMsg.classList.add('show');
        }

        document.getElementById('answerInput').addEventListener('input', showSuggestions);
        document.getElementById('answerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.input-container')) {
                hideSuggestions();
            }
        });

        // Charger les énigmes au démarrage
        loadEnigmes();
    </script>
</body>
</html>
