<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PFEtudiants</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 20px;
        }
        body.victory { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); transition: background 0.5s ease; }
        body.error   { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); transition: background 0.3s ease; }

        .nav-bar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: white; border-radius: 50px; padding: 10px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); display: flex; gap: 10px; z-index: 2000;
        }
        .nav-bar a {
            text-decoration: none; color: #2c3e50; padding: 8px 20px;
            border-radius: 25px; font-weight: 600; transition: all 0.3s;
        }
        .nav-bar a:hover { background: #f8f9fa; }
        .nav-bar a.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

        .container {
            background: white; border-radius: 20px; padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; width: 100%; margin-top: 60px;
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; font-size: 2em; }

        /* ── Mode toggle ───────────────────────────────────────── */
        .mode-toggle { display: flex; justify-content: center; margin-bottom: 20px; }
        .mode-toggle-inner {
            display: flex; background: #f0f0f5; border-radius: 30px; padding: 4px; gap: 4px;
        }
        .mode-btn {
            padding: 8px 22px; border-radius: 25px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.25s ease; background: transparent; color: #6c757d; flex: none;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; box-shadow: 0 3px 10px rgba(102, 126, 234, 0.4);
        }
        .mode-btn:hover:not(.active) { background: #e0e0ea; color: #2c3e50; transform: none; box-shadow: none; }

        .emoji-display {
            background: #f8f9fa; border: 3px solid #e9ecef; border-radius: 15px;
            padding: 30px; text-align: center; margin-bottom: 20px;
            min-height: 120px; display: flex; align-items: center; justify-content: center;
        }
        .emoji-display span { font-size: 60px; margin: 0 8px; font-family: 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif; }

        .score-display {
            text-align: center; color: #667eea; font-size: 20px; font-weight: bold;
            margin-bottom: 20px; padding: 10px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); border-radius: 10px;
        }
        .score-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 5px 15px; border-radius: 20px; font-size: 18px; margin-left: 10px;
        }
        .attempts { text-align: center; color: #6c757d; font-size: 16px; margin-bottom: 20px; font-weight: 500; }

        .input-container { position: relative; margin-bottom: 15px; }
        input[type="text"] {
            width: 100%; padding: 15px; font-size: 16px;
            border: 2px solid #dee2e6; border-radius: 10px; outline: none; transition: border-color 0.3s;
        }
        input[type="text"]:focus { border-color: #667eea; }

        .suggestions {
            position: absolute; top: 100%; left: 0; right: 0; background: white;
            border: 2px solid #dee2e6; border-top: none; border-radius: 0 0 10px 10px;
            max-height: 200px; overflow-y: auto; z-index: 1000; display: none;
        }
        .suggestions.show { display: block; }
        .suggestion-item { padding: 12px 15px; cursor: pointer; transition: background-color 0.2s; }
        .suggestion-item:hover { background-color: #f8f9fa; }

        .btn-submit, .btn-new {
            flex: 1; padding: 15px; font-size: 16px; font-weight: 600;
            border: none; border-radius: 10px; cursor: pointer; transition: transform 0.1s;
        }
        .btn-submit:hover, .btn-new:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-submit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-new    { background: #2ecc71; color: white; }
        .button-container   { display: flex; gap: 10px; margin-bottom: 20px; }
        .secondary-buttons  { display: flex; gap: 10px; justify-content: center; }

        .history-panel {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; width: 100%;
            max-height: 300px; overflow-y: auto;
        }
        .history-panel h3 { color: #2c3e50; margin-bottom: 20px; font-size: 1.2em; text-align: center; }
        .history-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .history-item {
            background: #f8f9fa; padding: 10px 15px; border-radius: 8px;
            border-left: 4px solid #e74c3c; color: #2c3e50; font-size: 14px; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .history-empty { text-align: center; color: #95a5a6; font-style: italic; padding: 20px; width: 100%; }

        .victory-message {
            display: none; position: fixed; top: 0; left: 0; right: 0; text-align: center;
            color: white; z-index: 3000; padding: 30px 20px;
            background: rgba(46,204,113,0.95); box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: victorySlideDown 0.5s ease;
        }
        .victory-message.show { display: block; }
        .victory-message h2  { font-size: 3em; margin-bottom: 10px; text-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .victory-message p   { font-size: 1.3em; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        @keyframes victorySlideDown { 0% { transform: translateY(-100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        .loading { text-align: center; color: white; font-size: 1.5em; margin-top: 60px; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.5em; }
            .emoji-display span { font-size: 45px; }
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html">PFEmoji</a>
        <a href="pfetudiants.html" class="active">PFEtudiants</a>
    </div>

    <div class="loading" id="loading">Chargement des énigmes...</div>

    <div class="container" style="display:none;" id="gameContainer">
        <h1>PFEtudiants</h1>

        <!-- Mode toggle -->
        <div class="mode-toggle">
            <div class="mode-toggle-inner">
                <button class="mode-btn active" id="btnComplet" onclick="setMode('complet')">🗂 Complet</button>
                <button class="mode-btn"         id="btnRapide"  onclick="setMode('rapide')">⚡ Rapide (10)</button>
            </div>
        </div>

        <div class="emoji-display" id="emojiDisplay"><span>❓</span></div>

        <div class="score-display" id="scoreDisplay">
            Score : <span class="score-badge" id="scoreValue">0</span>
            <span style="margin-left: 20px; font-size: 16px; color: #6c757d;">
                Énigmes résolues : <span id="resolvedCount">0</span>/<span id="totalCount">0</span>
            </span>
        </div>

        <div class="attempts" id="attemptsCounter">Essais : 0</div>

        <div class="input-container">
            <input type="text" id="answerInput" placeholder="C'est évidemment..." autocomplete="off">
            <div class="suggestions" id="suggestionsBox"></div>
        </div>
        <div class="button-container"><button class="btn-submit" onclick="checkAnswer()">Valider</button></div>
        <div class="secondary-buttons"><button class="btn-new" onclick="newEnigme()">Un autre !</button></div>
    </div>

    <div class="history-panel" style="display:none;" id="historyPanel">
        <h3>Ce n'est pas...</h3>
        <div class="history-list" id="historyList"><div class="history-empty">Aucune tentative</div></div>
    </div>

    <div class="victory-message" id="victoryMessage">
        <h2>🎉</h2><p id="victoryText"></p><p id="victoryAttempts"></p>
    </div>

    <script>
        /* ── State ────────────────────────────────────────────── */
        let enigmes       = [];
        let activePool    = [];
        let currentEnigme = null;
        let revealed      = 0;
        let attempts      = 0;
        let allAnswers    = [];
        let guessHistory  = [];
        let playedEnigmes = [];
        let totalScore    = 0;
        let currentMode   = 'complet';

        const QUICK_COUNT = 10;

        /* ── Placeholders ─────────────────────────────────────── */
        const placeholderMessages = [
            "C'est évidemment...","Ah, plutôt...","Alors peut-être...",
            "Ah non mince, bon bah c'est...","Allez, cette fois c'est...",
            "Bon, ...","Hmm...","...","Je dirais...","Ça doit être...",
            "Peut-être bien...","Je pense à...","Essayons avec...",
            "Ça pourrait être...","..."
        ];
        function updatePlaceholder() {
            const idx = attempts >= 14 ? 14 : Math.min(attempts, placeholderMessages.length - 2);
            document.getElementById('answerInput').placeholder = placeholderMessages[idx];
        }

        /* ── Score ────────────────────────────────────────────── */
        function calculateScore(a, t) { return a === 1 ? 100 + (t * 50) : Math.max(0, 100 - (a - 1) * 20); }
        function updateScoreDisplay() {
            document.getElementById('scoreValue').textContent    = totalScore;
            document.getElementById('resolvedCount').textContent = Math.max(0, playedEnigmes.length - 1);
            document.getElementById('totalCount').textContent    = activePool.length;
        }

        /* ── Helpers ──────────────────────────────────────────── */
        function normalize(s) { return s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); }
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        /* ── Mode toggle ──────────────────────────────────────── */
        function setMode(mode) {
            if (mode === currentMode) return;
            currentMode = mode;
            document.getElementById('btnComplet').classList.toggle('active', mode === 'complet');
            document.getElementById('btnRapide').classList.toggle('active',  mode === 'rapide');
            // Update label for "Complet" to show total count once enigmas are loaded
            if (enigmes.length > 0) {
                document.getElementById('btnComplet').textContent = `🗂 Complet (${enigmes.length})`;
            }
            startSession();
        }

        function buildPool() {
            return currentMode === 'rapide' ? shuffle(enigmes).slice(0, QUICK_COUNT) : [...enigmes];
        }

        /* ── Session ──────────────────────────────────────────── */
        function startSession() {
            activePool    = buildPool();
            playedEnigmes = [];
            totalScore    = 0;
            updateScoreDisplay();
            newEnigme();
        }

        async function loadEnigmes() {
            try {
                const r = await fetch('/api/etudiants');
                if (!r.ok) throw new Error(`HTTP error! status: ${r.status}`);
                enigmes    = await r.json();
                allAnswers = enigmes.map(e => e.reponse);

                document.getElementById('loading').style.display      = 'none';
                document.getElementById('gameContainer').style.display = 'block';
                document.getElementById('historyPanel').style.display  = 'block';

                // Show actual count on Complet button
                document.getElementById('btnComplet').textContent = `🗂 Complet (${enigmes.length})`;

                startSession();
            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerHTML = '⚠️ Erreur de chargement';
            }
        }

        function newEnigme() {
            if (activePool.length === 0) return;

            if (playedEnigmes.length >= activePool.length) {
                const finalScore = totalScore;
                const label = currentMode === 'rapide'
                    ? `Mode Rapide (${QUICK_COUNT} énigmes)`
                    : `Mode Complet (${enigmes.length} énigmes)`;
                alert(`🎉 Vous avez terminé toutes les énigmes !\n${label}\n\nScore final : ${finalScore} points\n\nBravo la tcheam`);
                startSession();
                return;
            }

            document.body.classList.remove('victory');
            document.getElementById('victoryMessage').classList.remove('show');

            const available   = activePool.filter(e => !playedEnigmes.some(p => p.reponse === e.reponse));
            currentEnigme     = available[Math.floor(Math.random() * available.length)];
            playedEnigmes.push(currentEnigme);

            revealed     = 1;
            attempts     = 0;
            guessHistory = [];

            updateHistoryDisplay();
            updatePlaceholder();
            updateScoreDisplay();
            document.getElementById('answerInput').value = '';
            updateDisplay();
            document.getElementById('answerInput').focus();
            hideSuggestions();
        }

        /* ── Display ──────────────────────────────────────────── */
        function updateDisplay() {
            const e      = currentEnigme.emojis;
            const shown  = e.slice(0, revealed).map(x => `<span>${x}</span>`).join('');
            const hidden = Array(e.length - revealed).fill('<span>❓</span>').join('');
            document.getElementById('emojiDisplay').innerHTML = shown + hidden;
            document.getElementById('attemptsCounter').textContent = `Essais : ${attempts}`;
        }
        function updateHistoryDisplay() {
            const h = document.getElementById('historyList');
            h.innerHTML = guessHistory.length === 0
                ? '<div class="history-empty">Aucune tentative</div>'
                : guessHistory.map(g => `<div class="history-item">${g}</div>`).join('');
        }

        /* ── Answer ───────────────────────────────────────────── */
        function checkAnswer() {
            const input = document.getElementById('answerInput');
            let ans = input.value.trim();
            if (!ans) return;

            const typed   = normalize(ans);
            const matches = allAnswers.filter(a => normalize(a).startsWith(typed));
            if (matches.length === 1) { ans = matches[0]; input.value = ans; }

            const isValid = allAnswers.some(a => normalize(a) === normalize(ans));
            if (!isValid) {
                input.style.borderColor = '#e74c3c';
                setTimeout(() => input.style.borderColor = '#dee2e6', 500);
                return;
            }

            attempts++;
            updatePlaceholder();

            if (normalize(ans) === normalize(currentEnigme.reponse)) {
                document.getElementById('emojiDisplay').innerHTML = currentEnigme.emojis.map(e => `<span>${e}</span>`).join('');
                document.getElementById('attemptsCounter').textContent = `Essais : ${attempts}`;
                const score = calculateScore(attempts, currentEnigme.emojis.length);
                totalScore += score;
                updateScoreDisplay();
                hideSuggestions();
                showVictory(score);
            } else {
                if (!guessHistory.includes(ans)) { guessHistory.push(ans); updateHistoryDisplay(); }
                document.body.classList.add('error');
                setTimeout(() => document.body.classList.remove('error'), 500);
                if (revealed < currentEnigme.emojis.length) revealed++;
                updateDisplay();
                input.value = '';
                hideSuggestions();
            }
        }

        /* ── Suggestions ──────────────────────────────────────── */
        function showSuggestions() {
            const input = document.getElementById('answerInput');
            const typed = normalize(input.value);
            const box   = document.getElementById('suggestionsBox');
            if (!typed) { hideSuggestions(); return; }
            const matches = allAnswers.filter(a => normalize(a).startsWith(typed) && !guessHistory.includes(a));
            if (matches.length === 0) { hideSuggestions(); return; }
            box.innerHTML = matches.map(a =>
                `<div class="suggestion-item" onclick="selectSuggestion('${a.replace(/'/g, "\\'")}'">${a}</div>`
            ).join('');
            box.classList.add('show');
        }
        function hideSuggestions()     { document.getElementById('suggestionsBox').classList.remove('show'); }
        function selectSuggestion(a)   { document.getElementById('answerInput').value = a; hideSuggestions(); document.getElementById('answerInput').focus(); }

        /* ── Victory ──────────────────────────────────────────── */
        function showVictory(s) {
            document.body.classList.add('victory');
            document.getElementById('victoryText').textContent     = `Bravo ! C'était bien ${currentEnigme.reponse}`;
            document.getElementById('victoryAttempts').textContent = `Trouvé en ${attempts} coup(s) ! +${s} points 🎯`;
            document.getElementById('victoryMessage').classList.add('show');
        }

        /* ── Events ───────────────────────────────────────────── */
        document.getElementById('answerInput').addEventListener('input',    showSuggestions);
        document.getElementById('answerInput').addEventListener('keypress', e => { if (e.key === 'Enter') checkAnswer(); });
        document.addEventListener('click', e => { if (!e.target.closest('.input-container')) hideSuggestions(); });

        loadEnigmes();
    </script>
</body>
</html>
